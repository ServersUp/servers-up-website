# Temporary: dump GitHub Actions OIDC claims (sts.amazonaws.com audience).
# Remove after confirming IAM trust matches the immutable sub format.
name: Debug OIDC claims

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Print OIDC token claims
        run: |
          set -euo pipefail
          RESP="$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")"
          TOKEN="$(printf '%s' "${RESP}" | jq -r .value)"
          if [[ -z "${TOKEN}" || "${TOKEN}" == "null" ]]; then
            echo "::error::Failed to fetch OIDC token"
            printf '%s\n' "${RESP}"
            exit 1
          fi
          export TOKEN
          python3 <<'PY'
          import json, os, base64
          token = os.environ["TOKEN"]
          payload = token.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload.encode("ascii")))
          print(json.dumps(claims, indent=2, sort_keys=True))
          print("---")
          for key in (
              "sub",
              "aud",
              "repository",
              "repository_id",
              "repository_owner",
              "repository_owner_id",
              "ref",
              "workflow_ref",
          ):
              print(f"{key}={claims.get(key)}")
          PY
